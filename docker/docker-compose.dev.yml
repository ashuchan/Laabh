version: "3.9"

# Development overrides — hot reload, debug logging, exposed ports
services:
  backend:
    volumes:
      - .:/app
    environment:
      LOG_LEVEL: DEBUG
    command: >
      uvicorn src.api.app:app
      --host 0.0.0.0
      --port 8000
      --reload
      --reload-dir src
    ports:
      - "8000:8000"

  postgres:
    ports:
      - "5432:5432"
